<!DOCTYPE html>
<html class="light" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Innov Agro - Premium Smartphones & Devices</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com" rel="preconnect"/>
    <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Space+Grotesk:wght@600;700&family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "outline-variant": "#c0c7d3",
                        "on-background": "#0b1c30",
                        "on-primary": "#ffffff",
                        "surface-container-lowest": "#ffffff",
                        "surface-container-high": "#dce9ff",
                        "surface-dim": "#cbdbf5",
                        "surface-container-highest": "#d3e4fe",
                        "background": "#f8f9ff",
                        "surface": "#f8f9ff",
                        "surface-variant": "#d3e4fe",
                        "surface-container-low": "#eff4ff",
                        "outline": "#717882",
                        "inverse-on-surface": "#eaf1ff",
                        "surface-container": "#e5eeff",
                        "surface-bright": "#f8f9ff",
                        "inverse-surface": "#213145",
                        "on-surface": "#0b1c30",
                        "secondary": "#565e74",
                        "primary": "#0071bd",
                        "on-secondary": "#ffffff",
                        "on-surface-variant": "#404751",
                        "secondary-container": "#dae2fd"
                    },
                    "borderRadius": {
                        "DEFAULT": "1rem",
                        "lg": "2rem",
                        "xl": "3rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "stack-xs": "4px",
                        "stack-md": "16px",
                        "margin-mobile": "16px",
                        "stack-xl": "64px",
                        "stack-sm": "8px",
                        "stack-lg": "32px",
                        "container-max": "1280px",
                        "gutter": "24px"
                    },
                    "fontFamily": {
                        "h2": ["Space Grotesk"],
                        "price-display": ["Space Grotesk"],
                        "body-md": ["Inter"],
                        "body-lg": ["Inter"],
                        "label-caps": ["Inter"],
                        "body-sm": ["Inter"],
                        "h3": ["Space Grotesk"],
                        "h1": ["Space Grotesk"]
                    },
                    "fontSize": {
                        "h2": ["36px", { "lineHeight": "1.2", "letterSpacing": "-0.01em", "fontWeight": "600" }],
                        "price-display": ["28px", { "lineHeight": "1", "letterSpacing": "-0.01em", "fontWeight": "700" }],
                        "body-md": ["16px", { "lineHeight": "1.5", "letterSpacing": "0em", "fontWeight": "400" }],
                        "body-lg": ["18px", { "lineHeight": "1.6", "letterSpacing": "0em", "fontWeight": "400" }],
                        "label-caps": ["12px", { "lineHeight": "1", "letterSpacing": "0.05em", "fontWeight": "600" }],
                        "body-sm": ["14px", { "lineHeight": "1.5", "letterSpacing": "0em", "fontWeight": "400" }],
                        "h3": ["24px", { "lineHeight": "1.3", "letterSpacing": "0em", "fontWeight": "600" }],
                        "h1": ["48px", { "lineHeight": "1.1", "letterSpacing": "-0.02em", "fontWeight": "700" }]
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-background text-on-background font-body-md text-body-md antialiased min-h-screen flex flex-col">
    <div id="root"></div>
    <script type="module" src="/src/index.jsx"></script>
</body>
</html>
